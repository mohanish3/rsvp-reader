<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedRead RSVP</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --secondary-bg: #1e1e1e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Views */
        .view { display: none; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; }
        .view.active { display: flex; }

        /* Reader Display */
        #reader-display {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            position: relative;
            cursor: pointer;
            user-select: none;
            font-family: 'Courier New', Courier, monospace;
            padding: 0 10px;
            overflow: hidden;
        }

        #word-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            width: 100%;
            text-align: center;
            font-size: clamp(20px, 5vw, 48px);
        }

        .part-left { text-align: right; color: var(--text-color); }
        .part-center { text-align: center; color: #ff4081; min-width: 1ch; }
        .part-right { text-align: left; color: var(--text-color); }

        /* Full-text panel — replaces reader-display when active */
        #full-text-panel {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 17px;
            line-height: 1.9;
            text-align: justify;
            cursor: default;
            -webkit-overflow-scrolling: touch;
        }
        .ft-word {
            cursor: pointer;
            border-radius: 3px;
            padding: 1px 0;
        }
        .ft-word:hover { color: var(--accent-color); }
        .ft-current {
            background-color: var(--accent-color);
            color: #000;
            padding: 1px 3px;
        }

        /* Controls */
        .controls {
            background-color: var(--secondary-bg);
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:active { opacity: 0.8; }
        button.secondary { background-color: #333; color: #fff; }

        input[type="range"] { width: 100%; }

        /* Library List */
        .doc-item {
            background-color: var(--secondary-bg);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .doc-title { font-weight: bold; margin-bottom: 5px; }
        .doc-meta { font-size: 12px; color: #888; }

        button.small {
            padding: 5px 10px;
            font-size: 12px;
            min-width: auto;
        }

        /* Inputs */
        textarea {
            width: 100%;
            height: 200px;
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- LIBRARY VIEW -->
    <div id="view-library" class="view active">
        <h2>My Library</h2>
        <div id="doc-list" style="overflow-y: auto; flex: 1;">
            <!-- Docs injected here -->
        </div>
        <div class="fab" onclick="showUpload()">+</div>
    </div>

    <!-- UPLOAD/PASTE VIEW -->
    <div id="view-upload" class="view">
        <h2>Add Content</h2>
        <button onclick="setView('view-library')" class="secondary" style="align-self: flex-start; margin-bottom: 20px;">&lt; Back</button>

        <h3>Paste Text</h3>
        <input type="text" id="paste-title" placeholder="Title (Optional)" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: none; color: white; box-sizing: border-box; border-radius: 8px;">
        <textarea id="paste-content" placeholder="Paste your text here..."></textarea>
        <button onclick="handlePaste()">Read Pasted Text</button>

        <h3 style="margin-top: 30px;">Or Upload PDF</h3>
        <input type="file" id="pdf-upload" accept="application/pdf">
        <button onclick="handlePdf()" style="margin-top: 10px;">Upload PDF</button>
    </div>

    <!-- READER VIEW -->
    <div id="view-reader" class="view">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
            <button onclick="saveAndExit()" class="secondary">Close</button>
            <span id="reader-title" style="font-size: 14px; color: #888; flex: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
            <button onclick="toggleFullText()" id="fulltext-btn" class="secondary">Full Text</button>
        </div>

        <div id="reader-display" onclick="togglePlay()">
            <span id="word-container">Ready</span>
        </div>

        <div id="full-text-panel" onclick="onFullTextClick(event)"></div>

        <div class="controls">
            <div class="control-row">
                <span id="wpm-display">300 WPM</span>
                <input type="range" id="wpm-slider" min="100" max="1000" step="50" value="300" oninput="updateWpm(this.value)">
            </div>

            <input type="range" id="progress-slider" min="0" max="100" value="0" oninput="seek(this.value)">
            <div style="text-align: center; font-size: 12px; margin-top: -10px;" id="progress-text">0%</div>

            <div class="control-row" style="justify-content: center; gap: 20px;">
                <button onclick="rewind(10)" class="secondary">-10</button>
                <button onclick="togglePlay()" id="play-btn" style="width: 80px;">Play</button>
                <button onclick="toggleChunk()" id="chunk-btn" class="secondary">1 Word</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let docs = [];
        let currentDoc = null;
        let words = [];
        let currentIndex = 0;
        let isPlaying = false;
        let wpm = 300;
        let intervalId = null;
        let chunkSize = 1;

        const API_URL = '/api';

        // Escape HTML to prevent XSS when inserting user content into innerHTML
        function esc(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Init
        fetchDocs();

        // API Calls
        async function fetchDocs() {
            const res = await fetch(`${API_URL}/documents`);
            docs = await res.json();
            renderLibrary();
        }

        function renderLibrary() {
            const list = document.getElementById('doc-list');
            if (!docs.length) {
                list.innerHTML = '<p style="color:#888; text-align:center; margin-top:40px;">No documents yet. Tap + to add one.</p>';
                return;
            }
            list.innerHTML = docs.map(doc => {
                const pct = doc.progressPercent || 0;
                const progress = pct > 0 ? `${pct}% read` : 'Not started';
                return `
                <div class="doc-item">
                    <div onclick="openDoc('${esc(doc.id)}')" style="flex: 1;">
                        <div class="doc-title">${esc(doc.title)}</div>
                        <div class="doc-meta">${esc(doc.type.toUpperCase())} &bull; ${new Date(doc.date).toLocaleDateString()} &bull; ${progress}</div>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button class="secondary small" onclick="renameDoc(event, '${esc(doc.id)}')">&#9998;</button>
                        <button class="secondary small" style="background-color: #cf6679; color: white;" onclick="deleteDoc('${esc(doc.id)}')">&#128465;</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function deleteDoc(id) {
            if (!confirm('Delete this document?')) return;
            await fetch(`${API_URL}/documents/${id}`, { method: 'DELETE' });
            fetchDocs();
        }

        async function renameDoc(event, id) {
            // Read current title from sibling DOM element (avoids putting title in JS attribute)
            const titleEl = event.target.closest('.doc-item').querySelector('.doc-title');
            const oldTitle = titleEl.textContent;
            const newTitle = prompt('New title:', oldTitle);
            if (!newTitle || newTitle === oldTitle) return;

            await fetch(`${API_URL}/documents/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: newTitle })
            });
            fetchDocs();
        }

        async function openDoc(id) {
            const res = await fetch(`${API_URL}/documents/${id}`);
            currentDoc = await res.json();
            words = currentDoc.content.split(/\s+/).filter(w => w.length > 0);
            currentIndex = Math.min(currentDoc.progress || 0, words.length - 1);

            document.getElementById('reader-title').textContent = currentDoc.title;
            // Always start in RSVP mode
            hideFullText();
            setView('view-reader');
            updateDisplay();
            updateProgressUI();
        }

        async function handlePaste() {
            const title = document.getElementById('paste-title').value;
            const content = document.getElementById('paste-content').value;
            if (!content.trim()) { alert('Please paste some text first.'); return; }

            const res = await fetch(`${API_URL}/paste`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });
            if (!res.ok) { const e = await res.json(); alert('Error: ' + e.error); return; }
            const doc = await res.json();
            openDoc(doc.id);
        }

        async function handlePdf() {
            const fileInput = document.getElementById('pdf-upload');
            if (!fileInput.files.length) { alert('Please select a PDF first.'); return; }

            const btn = document.querySelector('button[onclick="handlePdf()"]');
            btn.textContent = 'Uploading...';
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('pdf', fileInput.files[0]);

                const res = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Upload failed'); }

                const doc = await res.json();
                openDoc(doc.id);
            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                btn.textContent = 'Upload PDF';
                btn.disabled = false;
            }
        }

        // Reader Logic
        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            if (currentIndex >= words.length) {
                currentIndex = 0;
                updateDisplay();
                updateProgressUI();
            }

            isPlaying = true;
            document.getElementById('play-btn').textContent = 'Pause';

            const delay = (60000 / wpm) * chunkSize;
            intervalId = setInterval(() => {
                if (currentIndex >= words.length) { pause(); return; }
                currentIndex += chunkSize;
                updateDisplay();
                updateProgressUI();
            }, delay);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').textContent = 'Play';
            clearInterval(intervalId);
            saveProgress();
        }

        function rewind(amount) {
            currentIndex = Math.max(0, currentIndex - amount);
            updateDisplay();
            updateProgressUI();
            if (!isPlaying) saveProgress();
        }

        function seek(val) {
            currentIndex = Math.floor(words.length * (val / 100));
            updateDisplay();
            updateProgressUI();
            // Save on mouseup/touchend, not on every input tick
        }

        // Save progress when user finishes dragging the seek slider
        document.getElementById('progress-slider').addEventListener('change', () => {
            if (!isPlaying) saveProgress();
        });

        function updateWpm(val) {
            wpm = parseInt(val);
            document.getElementById('wpm-display').textContent = `${wpm} WPM`;
            if (isPlaying) { pause(); play(); }
        }

        function toggleChunk() {
            chunkSize = chunkSize === 1 ? 3 : 1;
            document.getElementById('chunk-btn').textContent = chunkSize === 1 ? '1 Word' : 'Chunk';
            updateDisplay();
        }

        // Full-text view
        let fullTextVisible = false;

        function toggleFullText() {
            fullTextVisible ? hideFullText() : showFullText();
        }

        function showFullText() {
            if (isPlaying) pause();
            fullTextVisible = true;
            document.getElementById('fulltext-btn').textContent = '← RSVP';
            document.getElementById('reader-display').style.display = 'none';

            const panel = document.getElementById('full-text-panel');
            panel.innerHTML = words.map((word, i) =>
                `<span class="ft-word${i === currentIndex ? ' ft-current' : ''}" data-i="${i}">${esc(word)}</span>`
            ).join(' ');
            panel.style.display = 'block';

            // Wait for layout before scrolling so the element has dimensions
            requestAnimationFrame(() => {
                const current = panel.querySelector('.ft-current');
                if (current) current.scrollIntoView({ block: 'center', behavior: 'smooth' });
            });
        }

        function hideFullText() {
            fullTextVisible = false;
            const btn = document.getElementById('fulltext-btn');
            if (btn) btn.textContent = 'Full Text';
            document.getElementById('full-text-panel').style.display = 'none';
            document.getElementById('reader-display').style.display = 'flex';
        }

        function onFullTextClick(event) {
            const span = event.target.closest('.ft-word');
            if (!span) return;
            currentIndex = parseInt(span.dataset.i);
            updateDisplay();
            updateProgressUI();
            hideFullText();
        }

        function updateDisplay() {
            const container = document.getElementById('word-container');

            if (currentIndex >= words.length) {
                container.textContent = 'Done';
                container.style.display = '';
                return;
            }

            const chunk = words.slice(currentIndex, currentIndex + chunkSize).join(' ');
            if (!chunk) return;

            if (chunkSize > 1) {
                container.style.display = 'flex';
                container.style.textAlign = 'center';
                container.style.justifyContent = 'center';
                container.style.whiteSpace = 'nowrap';
                container.textContent = chunk;
            } else {
                const len = chunk.length;
                const orpIndex = Math.ceil(len / 4);
                const pre = esc(chunk.substring(0, orpIndex));
                const mid = esc(chunk[orpIndex] || '');
                const post = esc(chunk.substring(orpIndex + 1));

                container.style.display = 'grid';
                container.style.whiteSpace = '';
                container.style.justifyContent = '';
                container.innerHTML = `<span class="part-left">${pre}</span><span class="part-center">${mid}</span><span class="part-right">${post}</span>`;
            }
        }

        function updateProgressUI() {
            const pct = words.length ? (currentIndex / words.length) * 100 : 0;
            document.getElementById('progress-slider').value = pct;
            document.getElementById('progress-text').textContent = `${Math.floor(pct)}%`;
        }

        async function saveProgress() {
            if (!currentDoc) return;
            await fetch(`${API_URL}/documents/${currentDoc.id}/progress`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index: currentIndex })
            });
        }

        function saveAndExit() {
            pause();
            saveProgress();
            fetchDocs();
            setView('view-library');
        }

        // Navigation
        function setView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function showUpload() { setView('view-upload'); }
    </script>
</body>
</html>
